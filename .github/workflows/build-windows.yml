name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: List bundle outputs
        shell: pwsh
        run: |
          Write-Host "Bundle directory tree:"
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse | Select-Object FullName
          }
          else {
            Write-Host "src-tauri/target/release/bundle not found"
          }

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BongoCat-sync-windows
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error
